version: '3.8'

services:
  db:
    image: postgres:13-alpine
    container_name: task-management-db
    restart: always
    environment:
      POSTGRES_DB: generated_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432" # Map host port 5433 to container port 5432
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d generated_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-management-backend
    restart: always
    ports:
      - "8000:5000" # Map host port 8000 to container port 5000
    environment:
      PG_CONNECTION_STRING: "postgresql://postgres:postgres@db:5432/generated_db"
      PORT: 5000
      JWT_ACCESS_SECRET: "your_super_secret_access_key_here_please_change_this_in_production" # IMPORTANT: Use strong, randomly generated secrets
      JWT_REFRESH_SECRET: "your_super_secret_refresh_key_here_please_change_this_in_production" # IMPORTANT: Use strong, randomly generated secrets
      ACCESS_TOKEN_EXPIRATION: "15m"
      REFRESH_TOKEN_EXPIRATION: "7d"
      REFRESH_TOKEN_EXPIRATION_MS: 604800000 # 7 days in milliseconds
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app # Mount for development, remove for production if not needed
      - /app/node_modules # Exclude node_modules from host mount
    command: sh -c "npm install && npm run migrate && npm start" # Install dependencies, run migrations, then start server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/protected"] # Adjust to a simple public endpoint if /protected requires auth
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task-management-frontend
    restart: always
    ports:
      - "3000:80" # Map host port 3000 to container port 80 (Nginx default)
    environment:
      VITE_API_BASE_URL: "http://localhost:8000/api" # Frontend accesses backend via host port 8000
    depends_on:
      backend:
        condition: service_healthy
    # For production, Nginx serves the static files, no need for volumes here
    # For development, you might want to use a dev server with volumes:
    # volumes:
    #   - ./frontend:/app
    #   - /app/node_modules
    # command: npm run dev # If using Vite dev server directly

volumes:
  db_data:
